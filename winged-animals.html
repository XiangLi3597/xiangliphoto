<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>有翼的动物 | Winged Animals</title>
<style>
:root{
  --paper:#f6f2ea;--ink:#151515;--muted:#6f6f6f;--line:rgba(0,0,0,.08);
  --shadow:0 10px 28px rgba(0,0,0,.08);--radius:14px;

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --lh:1.65;
  --ls-title:.2px;
  --ls-body:.1px;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--ink);
  background:radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
  radial-gradient(circle at 80% 0%, rgba(0,0,0,.02), transparent 35%),
  linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)), var(--paper);
  line-height:var(--lh);

  letter-spacing:var(--ls-body);
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
a{color:inherit;text-decoration:none}
.container{width:min(1120px,92%);margin:0 auto;padding-bottom:40px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line);color:var(--muted)}
.back{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.55)}
.hero{padding:20px 0}h1{margin:0;font-size:clamp(28px,4vw,42px)}.sub{color:var(--muted);margin-top:8px}
.masonry{column-count:3;column-gap:18px;margin-top:22px}@media(max-width:980px){.masonry{column-count:2}}@media(max-width:560px){.masonry{column-count:1}}
.item{break-inside:avoid;margin:0 0 18px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);
background:rgba(255,255,255,.6);box-shadow:var(--shadow)}
.item img{width:100%;height:auto;display:block;cursor:zoom-in}
.cap{padding:10px 12px;border-top:1px solid rgba(0,0,0,.06)}.cap .cn{margin:0;font-size:14px}.cap .en{margin:0;font-size:12px;color:var(--muted)}
.footer{padding:18px 0 32px;text-align:center;color:var(--muted);border-top:1px solid var(--line)}
.lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.9);z-index:9999}
.lightbox.show{display:flex}.lightbox img{max-width:min(1400px,96vw);max-height:88vh;border-radius:12px}
.close{position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer}

/* Typography + Series nav */
h1,h2{letter-spacing:var(--ls-title);font-weight:650}

.series-nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  margin:12px 0 0;
}

.navbtn{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.55);
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  font-size:14px;
  color:var(--muted);
  transition:.15s;
}

.navbtn:hover{transform:translateY(-1px)}
</style>
</head><body>
<div class="container">
  <div class="topbar"><a class="back" href="index.html">← 返回首页</a><div>Series — Winged</div></div>
  <div class="series-nav">
  <a class="navbtn" href="mobile-photography.html">← 上一系列</a>
  <a class="navbtn" href="index.html">返回首页</a>
  <a class="navbtn" href="scenes-along-the-way.html">下一系列 →</a>
</div>
  <div class="hero"><h1>有翼的动物</h1><div class="sub">Winged Animals</div><p class="desc">带翅的生命：羽毛、翅膀结构与飞行的瞬间。</p></div>

  <main><div class="masonry">
    <div class="item"><img src="images/images/winged-animals/wing-01.jpg" alt="有翼 01" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 01</p><p class="en">Wing 01</p></div></div>
    <div class="item"><img src="images/images/winged-animals/wing-02.jpg" alt="有翼 02" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 02</p><p class="en">Wing 02</p></div></div>
    <div class="item"><img src="images/images/winged-animals/wing-03.jpg" alt="有翼 03" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 03</p><p class="en">Wing 03</p></div></div>
    <div class="item"><img src="images/images/winged-animals/wing-04.jpg" alt="有翼 04" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 04</p><p class="en">Wing 04</p></div></div>
    <div class="item"><img src="images/images/winged-animals/wing-05.jpg" alt="有翼 05" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 05</p><p class="en">Wing 05</p></div></div>
    <div class="item"><img src="images/images/winged-animals/wing-06.jpg" alt="有翼 06" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">有翼 06</p><p class="en">Wing 06</p></div></div>
  </div></main>

  <div class="footer">© 2026 Xiang Li / 李响 · Winged Animals</div>
</div>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div><img id="lbImg" src="" alt="">
</div>
<script>
function openLightbox(s,a){const b=document.getElementById('lightbox'),i=document.getElementById('lbImg');i.src=s;i.alt=a||'';b.classList.add('show');document.body.style.overflow='hidden'}
function closeLightbox(){const b=document.getElementById('lightbox'),i=document.getElementById('lbImg');b.classList.remove('show');i.src='';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()})
</script>
</body></html>
