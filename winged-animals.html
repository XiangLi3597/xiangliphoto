<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>有翼的动物 | winged-animals</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
margin:0;
background:#f6f2ea;
color:#151515;
}

.container{
width:min(1100px,92%);
margin:auto;
}

header{
padding:20px 0;
border-bottom:1px solid rgba(0,0,0,.1);
}

.series-nav{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.navbtn{
padding:8px 12px;
border-radius:999px;
border:1px solid rgba(0,0,0,.15);
background:white;
text-decoration:none;
font-size:14px;
}

.hero{
padding:10px 0 20px;
}

.masonry{
column-count:3;
column-gap:16px;
}

@media(max-width:900px){
.masonry{column-count:2;}
}

@media(max-width:600px){
.masonry{column-count:1;}
}

.item{
break-inside:avoid;
margin-bottom:16px;
background:white;
border-radius:12px;
overflow:hidden;
}

.item img{
width:100%;
display:block;
cursor:pointer;
}

.cap{
padding:10px;
font-size:13px;
color:#666;
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.lightbox.show{
display:flex;
}

.lightbox img{
max-width:95vw;
max-height:90vh;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:42px;
color:white;
background:rgba(0,0,0,0.35);
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.prev{left:20px;border-radius:30px;}
.next{right:20px;border-radius:30px;}

@media(max-width:700px){
.nav{display:none;}
}

</style>
</head>

<body>

<header class="container">

<div class="series-nav">

<a class="navbtn" href="mobile-photography.html">← 上一系列</a>

<a class="navbtn" href="index.html">返回首页</a>

<a class="navbtn" href="scenes-along-the-way.html">下一系列 →</a>

</div>

<div class="hero">

<h1>有翼的动物</h1>

<div>winged-animals</div>

</div>

</header>

<main class="container">

<div class="masonry" id="gallery"></div>

</main>

<div id="lightbox" class="lightbox">

<div class="close" onclick="closeLightbox()">×</div>

<div class="nav prev" onclick="prevImage()">‹</div>

<img id="viewer">

<div class="nav next" onclick="nextImage()">›</div>

</div>

<script>

const TOTAL_IMAGES = 6
const PREFIX = "small"

let images=[]
let index=0

const gallery=document.getElementById("gallery")

for(let i=1;i<=TOTAL_IMAGES;i++){

let num=i.toString().padStart(2,'0')

gallery.innerHTML += `
<div class="item">
<img src="images/images/${PREFIX}/${PREFIX}-${num}.jpg" onclick="openLightbox(this.src,${i-1})">
<div class="cap">${num}</div>
</div>
`

}

function openLightbox(src,i){

images=[...document.querySelectorAll(".item img")]

index=i

document.getElementById("viewer").src=src

document.getElementById("lightbox").classList.add("show")

}

function closeLightbox(){

document.getElementById("lightbox").classList.remove("show")

}

function prevImage(){

index=(index-1+images.length)%images.length

document.getElementById("viewer").src=images[index].src

}

function nextImage(){

index=(index+1)%images.length

document.getElementById("viewer").src=images[index].src

}

let startX=0

document.getElementById("lightbox").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.getElementById("lightbox").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX

if(startX-endX>60)nextImage()
if(endX-startX>60)prevImage()

})

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight")nextImage()
if(e.key==="ArrowLeft")prevImage()
if(e.key==="Escape")closeLightbox()

})

</script>

</body>
</html>
