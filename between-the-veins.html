<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>叶脉之间 | Between the Veins</title>
<style>
:root{--paper:#f6f2ea;--ink:#151515;--muted:#6f6f6f;--line:rgba(0,0,0,.08);--shadow:0 10px 28px rgba(0,0,0,.08);--radius:14px}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--paper);line-height:1.6}
.container{width:min(1120px,92%);margin:0 auto;padding-bottom:40px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line);color:var(--muted)}
.back{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.55)}
.hero{padding:20px 0}
h1{margin:0;font-size:clamp(28px,4vw,42px)}
.sub{color:var(--muted);margin-top:8px}
.masonry{column-count:3;column-gap:18px;margin-top:22px}
@media(max-width:980px){.masonry{column-count:2}}@media(max-width:560px){.masonry{column-count:1}}
.item{break-inside:avoid;margin:0 0 18px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:rgba(255,255,255,.6);box-shadow:var(--shadow)}
.item img{width:100%;height:auto;display:block;cursor:zoom-in}
.cap{padding:10px 12px;border-top:1px solid rgba(0,0,0,.06)}
.cap .cn{font-size:14px;margin:0}
.cap .en{font-size:12px;color:var(--muted);margin:0}
.footer{padding:18px 0 32px;text-align:center;color:var(--muted);border-top:1px solid var(--line)}
.lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.9);z-index:9999}
.lightbox.show{display:flex} .lightbox img{max-width:min(1400px,96vw);max-height:88vh;border-radius:12px}
.close{position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a class="back" href="index.html">← 返回首页</a>
    <div>Series — Between the Veins</div>
  </div>

  <div class="hero">
    <h1>叶脉之间</h1>
    <div class="sub">Between the Veins — Plants & structural details</div>
    <p class="desc">植物细节与结构的观察：叶脉、纹理、切面与光影的小小世界。</p>
  </div>

  <main>
    <div class="masonry">
      <!-- 1 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-01.jpg" alt="叶脉之间 01" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 01</p><p class="en">Between 01</p></div>
      </div>
      <!-- 2 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-02.jpg" alt="叶脉之间 02" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 02</p><p class="en">Between 02</p></div>
      </div>
      <!-- 3 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-03.jpg" alt="叶脉之间 03" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 03</p><p class="en">Between 03</p></div>
      </div>
      <!-- 4 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-04.jpg" alt="叶脉之间 04" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 04</p><p class="en">Between 04</p></div>
      </div>
      <!-- 5 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-05.jpg" alt="叶脉之间 05" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 05</p><p class="en">Between 05</p></div>
      </div>
      <!-- 6 -->
      <div class="item">
        <img src="images/images/between-the-veins/between-06.jpg" alt="叶脉之间 06" onclick="openLightbox(this.src,this.alt)">
        <div class="cap"><p class="cn">叶脉之间 06</p><p class="en">Between 06</p></div>
      </div>
    </div>
  </main>

  <div class="footer">© 2026 Xiang Li / 李响 · Between the Veins</div>
</div>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div>
  <img id="lbImg" src="" alt="">
</div>

<script>
function openLightbox(src,alt){const b=document.getElementById('lightbox'),img=document.getElementById('lbImg');img.src=src;img.alt=alt||'';b.classList.add('show');document.body.style.overflow='hidden'}
function closeLightbox(){const b=document.getElementById('lightbox'),img=document.getElementById('lbImg');b.classList.remove('show');img.src='';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()})
</script>
</body>
</html>
