<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微末之生 | Small Lives, Quiet Worlds</title>
  <meta name="description" content="微末之生：昆虫与微小生命摄影系列。">
  <style>
    :root{--paper:#f6f2ea;--ink:#151515;--muted:#6f6f6f;--line:rgba(0,0,0,.08);--shadow:0 10px 28px rgba(0,0,0,.08);--radius:14px;}
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
        radial-gradient(circle at 80% 0%, rgba(0,0,0,.02), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)),
        var(--paper);
      line-height:1.6;
    }
    a{color:inherit;text-decoration:none;}
    .container{width:min(1120px,92%);margin:0 auto;}
    header{padding:18px 0 10px;border-bottom:1px solid var(--line);}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;color:var(--muted);}
    .back{display:inline-block;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.55);box-shadow:0 6px 18px rgba(0,0,0,.06);}
    .hero{padding:20px 0 26px;}
    h1{margin:0;font-size:clamp(28px,4vw,44px);font-weight:600;}
    .sub{margin:8px 0 12px;color:var(--muted);font-size:14px;}
    .desc{margin:0;max-width:860px;color:#3a3a3a;font-size:14px;}
    main{padding:22px 0 44px;}
    .masonry{column-count:3;column-gap:18px;}
    @media (max-width: 980px){ .masonry{column-count:2;} }
    @media (max-width: 560px){ .masonry{column-count:1;} }
    .item{break-inside:avoid;margin:0 0 18px;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
    .item img{width:100%;height:auto;display:block;cursor:zoom-in;}
    .cap{padding:10px 12px 12px;border-top:1px solid rgba(0,0,0,.06);}
    .cap .cn{font-size:14px;margin:0 0 4px;}
    .cap .en{font-size:12px;color:var(--muted);margin:0;}
    footer{padding:18px 0 34px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;text-align:center;}
    .lightbox{position:fixed;inset:0;background:rgba(10,10,10,.9);display:none;align-items:center;justify-content:center;padding:24px;z-index:9999;}
    .lightbox.show{display:flex;}
    .lightbox img{max-width:min(1400px,96vw);max-height:88vh;border-radius:12px;background:#111;box-shadow:0 18px 50px rgba(0,0,0,.35);}
    .close{position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);user-select:none;}
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="topbar">
      <a class="back" href="index.html">← 返回首页 / Back to Home</a>
      <div>Series 02</div>
    </div>
    <div class="hero">
      <h1>微末之生</h1>
      <div class="sub">Small Lives, Quiet Worlds</div>
      <p class="desc">昆虫与微小生命系列。把目光放低，让微小的存在拥有被认真看见的时刻。</p>
    </div>
  </div>
</header>

<main class="container">
  <div class="masonry">
    <div class="item"><img src="images/images/small-lives/small-01.jpg" alt="微末之生 01" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 01</p><p class="en">Small Lives 01</p></div></div>
    <div class="item"><img src="images/images/small-lives/small-02.jpg" alt="微末之生 02" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 02</p><p class="en">Small Lives 02</p></div></div>
    <div class="item"><img src="images/images/small-lives/small-03.jpg" alt="微末之生 03" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 03</p><p class="en">Small Lives 03</p></div></div>
    <div class="item"><img src="images/images/small-lives/small-04.jpg" alt="微末之生 04" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 04</p><p class="en">Small Lives 04</p></div></div>
    <div class="item"><img src="images/images/small-lives/small-05.jpg" alt="微末之生 05" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 05</p><p class="en">Small Lives 05</p></div></div>
    <div class="item"><img src="images/images/small-lives/small-06.jpg" alt="微末之生 06" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">微末之生 06</p><p class="en">Small Lives 06</p></div></div>
  </div>
</main>

<footer>© 2026 Xiang Li / 李响 · Small Lives Series</footer>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div>
  <img id="lbImg" src="" alt="">
</div>

<script>
  function openLightbox(src, alt){
    const box=document.getElementById('lightbox');
    const img=document.getElementById('lbImg');
    img.src=src; img.alt=alt||'';
    box.classList.add('show');
    document.body.style.overflow='hidden';
  }
  function closeLightbox(){
    const box=document.getElementById('lightbox');
    const img=document.getElementById('lbImg');
    box.classList.remove('show');
    img.src='';
    document.body.style.overflow='';
  }
  document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeLightbox(); });
</script>

</body>
</html>
