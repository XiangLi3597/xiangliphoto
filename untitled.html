<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>未名 | Untitled</title>
<style>
  :root{
    --paper:#f6f2ea;
    --ink:#151515;
    --muted:#6f6f6f;
    --line:rgba(0,0,0,.08);
    --shadow:0 10px 28px rgba(0,0,0,.08);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
      radial-gradient(circle at 80% 0%, rgba(0,0,0,.02), transparent 35%),
      linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)),
      var(--paper);
    line-height:1.6;
  }
  a{color:inherit;text-decoration:none}
  .container{width:min(1120px,92%);margin:0 auto;padding-bottom:40px}

  header{
    padding:18px 0 10px;
    border-bottom:1px solid var(--line);
  }
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:14px;
  }
  .back{
    padding:8px 12px;border-radius:999px;border:1px solid var(--line);
    background:rgba(255,255,255,.55);
  }

  .titlewrap{padding:18px 0 6px}
  h1{
    margin:0;
    font-size:clamp(28px,4vw,44px);
    font-weight:600;
    letter-spacing:.2px;
  }
  .en{
    margin-top:6px;
    color:var(--muted);
    font-size:13px;
  }

  main{padding:18px 0 44px}

  /* 瀑布流：横竖图自然比例 */
  .masonry{column-count:3;column-gap:18px}
  @media(max-width:980px){.masonry{column-count:2}}
  @media(max-width:560px){.masonry{column-count:1}}

  .item{
    break-inside:avoid;
    margin:0 0 18px;
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--line);
    background:rgba(255,255,255,.6);
    box-shadow:var(--shadow);
  }
  .item img{
    width:100%;
    height:auto;
    display:block;
    cursor:zoom-in;
  }

  footer{
    padding:18px 0 32px;
    border-top:1px solid var(--line);
    color:var(--muted);
    font-size:13px;
    text-align:center;
  }

  /* Lightbox */
  .lightbox{
    position:fixed;inset:0;
    background:rgba(10,10,10,.9);
    display:none;align-items:center;justify-content:center;
    padding:24px;z-index:9999;
  }
  .lightbox.show{display:flex}
  .lightbox img{
    max-width:min(1400px,96vw);
    max-height:88vh;
    border-radius:12px;
    background:#111;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .close{
    position:absolute;top:14px;right:16px;
    width:40px;height:40px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:24px;cursor:pointer;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(255,255,255,.08);
    user-select:none;
  }
</style>
</head>

<body>
<div class="container">
  <header>
    <div class="topbar">
      <a class="back" href="index.html">← 返回首页</a>
      <div></div>
    </div>
    <div class="titlewrap">
      <h1>未名</h1>
      <div class="en">Untitled</div>
    </div>
  </header>

  <main>
    <div id="grid" class="masonry"></div>
  </main>

  <footer>© 2026 Xiang Li / 李响</footer>
</div>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div>
  <img id="lbImg" src="" alt="">
</div>

<script>
  // 你现在要 12 张：只改这个数字即可扩展
  const TOTAL = 12;

  const folder = "images/images/untitled/";
  const grid = document.getElementById("grid");

  function pad2(n){ return String(n).padStart(2, "0"); }

  for(let i=1; i<=TOTAL; i++){
    const num = pad2(i);
    const src = folder + "untitled-" + num + ".jpg";

    const item = document.createElement("div");
    item.className = "item";

    const img = document.createElement("img");
    img.src = src;
    img.alt = "Untitled";
    img.loading = "lazy";
    img.onclick = () => openLightbox(src, "Untitled");

    item.appendChild(img);
    grid.appendChild(item);
  }

  function openLightbox(src, alt){
    const box = document.getElementById("lightbox");
    const img = document.getElementById("lbImg");
    img.src = src;
    img.alt = alt || "";
    box.classList.add("show");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox(){
    const box = document.getElementById("lightbox");
    const img = document.getElementById("lbImg");
    box.classList.remove("show");
    img.src = "";
    document.body.style.overflow = "";
  }

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeLightbox();
  });
</script>
</body>
</html>
