<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>路上所见 | Scenes Along the Way</title>
<style>
:root{--paper:#f6f2ea;--ink:#151515;--muted:#6f6f6f;--line:rgba(0,0,0,.08);--shadow:0 10px 28px rgba(0,0,0,.08);--radius:14px}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);
background:radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
radial-gradient(circle at 80% 0%, rgba(0,0,0,.02), transparent 35%),
linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)), var(--paper);line-height:1.6}
a{color:inherit;text-decoration:none}
.container{width:min(1120px,92%);margin:0 auto;padding-bottom:40px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line);color:var(--muted)}
.back{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.55)}
.hero{padding:20px 0}h1{margin:0;font-size:clamp(28px,4vw,42px)}.sub{color:var(--muted);margin-top:8px}
.masonry{column-count:3;column-gap:18px;margin-top:22px}
@media(max-width:980px){.masonry{column-count:2}}
@media(max-width:560px){.masonry{column-count:1}}
.item{break-inside:avoid;margin:0 0 18px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);
background:rgba(255,255,255,.6);box-shadow:var(--shadow)}
.item img{width:100%;height:auto;display:block;cursor:zoom-in}
.cap{padding:10px 12px;border-top:1px solid rgba(0,0,0,.06)}
.cap .cn{margin:0;font-size:14px}
.cap .en{margin:0;font-size:12px;color:var(--muted)}
.footer{padding:18px 0 32px;text-align:center;color:var(--muted);border-top:1px solid var(--line)}
.lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.9);z-index:9999}
.lightbox.show{display:flex}
.lightbox img{max-width:min(1400px,96vw);max-height:88vh;border-radius:12px}
.close{position:absolute;top:14px;right:16px;width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="topbar"><a class="back" href="index.html">← 返回首页</a><div>Series — Scenes</div></div>
  <div class="hero">
    <h1>路上所见</h1>
    <div class="sub">Scenes Along the Way</div>
    <p class="desc">旅行中的非人像记录：街角、光线、物件与风景里那些短暂但清晰的瞬间。</p>
  </div>

  <main><div class="masonry">
    <div class="item"><img src="images/images/scenes/scene-01.jpg" alt="路上所见 01" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 01</p><p class="en">Scenes 01</p></div></div>
    <div class="item"><img src="images/images/scenes/scene-02.jpg" alt="路上所见 02" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 02</p><p class="en">Scenes 02</p></div></div>
    <div class="item"><img src="images/images/scenes/scene-03.jpg" alt="路上所见 03" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 03</p><p class="en">Scenes 03</p></div></div>
    <div class="item"><img src="images/images/scenes/scene-04.jpg" alt="路上所见 04" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 04</p><p class="en">Scenes 04</p></div></div>
    <div class="item"><img src="images/images/scenes/scene-05.jpg" alt="路上所见 05" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 05</p><p class="en">Scenes 05</p></div></div>
    <div class="item"><img src="images/images/scenes/scene-06.jpg" alt="路上所见 06" onclick="openLightbox(this.src,this.alt)"><div class="cap"><p class="cn">路上所见 06</p><p class="en">Scenes 06</p></div></div>
  </div></main>

  <div class="footer">© 2026 Xiang Li / 李响 · Scenes Along the Way</div>
</div>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
  <div class="close" onclick="closeLightbox()">×</div><img id="lbImg" src="" alt="">
</div>
<script>
function openLightbox(s,a){const b=document.getElementById('lightbox'),i=document.getElementById('lbImg');i.src=s;i.alt=a||'';b.classList.add('show');document.body.style.overflow='hidden'}
function closeLightbox(){const b=document.getElementById('lightbox'),i=document.getElementById('lbImg');b.classList.remove('show');i.src='';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()})
</script>
</body>
</html>
