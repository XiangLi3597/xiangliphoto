<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>路遇生灵 | Creatures Along the Way</title>
<meta name="description" content="路遇生灵：记录旅途中偶然相遇的生命与自然瞬间。">

<style>
:root{
  --paper:#f6f2ea;
  --ink:#151515;
  --muted:#6f6f6f;
  --line:rgba(0,0,0,.08);
  --shadow:0 10px 28px rgba(0,0,0,.08);
  --radius:14px;

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --lh:1.65;
  --ls-title:.2px;
  --ls-body:.1px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
    radial-gradient(circle at 80% 0%, rgba(0,0,0,.02), transparent 35%),
    linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)),
    var(--paper);
  line-height:var(--lh);
  letter-spacing:var(--ls-body);
  text-rendering:optimizeLegibility;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

a{color:inherit;text-decoration:none}
.container{width:min(1120px,92%);margin:0 auto}

header{padding:18px 0 10px;border-bottom:1px solid var(--line)}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:14px;
  color:var(--muted);
}
.back{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.55);
  box-shadow:0 6px 18px rgba(0,0,0,.06);
}
.back:hover{transform:translateY(-1px)}

h1,h2{letter-spacing:var(--ls-title);font-weight:650;margin:0}

.series-nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  margin:12px 0 0;
}
.navbtn{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.55);
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  font-size:14px;
  color:var(--muted);
  transition:.15s;
}
.navbtn:hover{transform:translateY(-1px)}

.hero{padding:20px 0 26px}
.sub{margin:8px 0 12px;color:var(--muted);font-size:14px}
.desc{margin:0;max-width:860px;color:#3a3a3a;font-size:14px}

main{padding:22px 0 44px}
.masonry{column-count:3;column-gap:18px}
@media (max-width:980px){.masonry{column-count:2}}
@media (max-width:560px){.masonry{column-count:1}}

.item{
  break-inside:avoid;
  margin:0 0 18px;
  background:rgba(255,255,255,.55);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.item img{
  width:100%;
  height:auto;
  display:block;
  cursor:zoom-in;
}
.cap{
  padding:10px 12px 12px;
  border-top:1px solid rgba(0,0,0,.06);
}
.cap .cn{font-size:14px;margin:0}

footer{
  padding:18px 0 34px;
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:13px;
  text-align:center;
}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;
  background:rgba(10,10,10,.92);
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:9999;
}
.lightbox.show{display:flex}
.lightbox img{
  max-width:min(1600px,96vw);
  max-height:88vh;
  border-radius:12px;
  background:#111;
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.close{
  position:absolute;top:14px;right:16px;
  width:40px;height:40px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:24px;cursor:pointer;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.08);
}
.lbnav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:54px;height:54px;
  border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;
  font-size:34px;
  cursor:pointer;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22);
}
.lbprev{left:18px}
.lbnext{right:18px}
</style>
</head>

<body>
<header>
<div class="container">

<div class="topbar">
<a class="back" href="index.html">← 返回首页</a>
<div>Series — Creatures Along the Way</div>
</div>

<div class="series-nav">
<a class="navbtn" href="small-lives.html">← 上一系列</a>
<a class="navbtn" href="index.html">返回首页</a>
<a class="navbtn" href="mobile-photography.html">下一系列 →</a>
</div>

<div class="hero">
<h1>路遇生灵</h1>
<div class="sub">Creatures Along the Way</div>
<p class="desc">旅途中偶然遇见的动物与生命片段，记录那些不经意的相遇。</p>
</div>

</div>
</header>

<main class="container">
<div id="masonry" class="masonry"></div>
</main>

<footer>© 2026 Xiang Li / 李响 · Creatures Along the Way</footer>

<div id="lightbox" class="lightbox" onclick="if(event.target.id==='lightbox') closeLightbox()">
<div class="close" onclick="closeLightbox()">×</div>
<div class="lbnav lbprev" onclick="prevImage(event)">‹</div>
<img id="lbImg" src="">
<div class="lbnav lbnext" onclick="nextImage(event)">›</div>
</div>

<script>

/* ====== 你只需要改这里 ====== */
const TOTAL = 6;
const BASE = "images/images/road-encounters/";
const PREFIX = "road-";
const EXT = ".jpg";
/* ============================ */

const masonry = document.getElementById("masonry");
const imgs = [];

function pad2(n){ return String(n).padStart(2,"0"); }

for(let i=1;i<=TOTAL;i++){
const src = `${BASE}${PREFIX}${pad2(i)}${EXT}`;
imgs.push(src);

const item = document.createElement("div");
item.className = "item";
item.innerHTML = `
<img src="${src}" alt="路遇生灵" loading="lazy">
<div class="cap"><p class="cn"></p></div>
`;
item.querySelector("img").addEventListener("click",()=>openLightbox(i-1));
masonry.appendChild(item);
}

let current = 0;
const box = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");

function openLightbox(idx){
current = idx;
lbImg.src = imgs[current];
box.classList.add("show");
document.body.style.overflow="hidden";
}

function closeLightbox(){
box.classList.remove("show");
document.body.style.overflow="";
}

function prevImage(e){
if(e)e.stopPropagation();
current=(current-1+imgs.length)%imgs.length;
lbImg.src=imgs[current];
}

function nextImage(e){
if(e)e.stopPropagation();
current=(current+1)%imgs.length;
lbImg.src=imgs[current];
}

</script>

</body>
</html>
